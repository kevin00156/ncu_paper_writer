name: Lint

# 每次 push / PR 都跑，無編譯，30 秒內結束
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-skill:
    name: Lint Skill markdown
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check Skill front matter
        run: |
          # Skill 必須有 name 和 description 欄位
          for skill in skill/*/SKILL.md; do
            if ! grep -q "^name:" "$skill"; then
              echo "::error file=$skill::Missing 'name:' in frontmatter"
              exit 1
            fi
            if ! grep -q "^description:" "$skill"; then
              echo "::error file=$skill::Missing 'description:' in frontmatter"
              exit 1
            fi
            echo "OK: $skill"
          done

      - name: Check for forbidden em-dash in actual paper content
        run: |
          # NCU 規範禁止「——」用於論文正文
          # 只檢查實際的論文內容（examples 的 paper.md），不檢查說明規則的文件
          violations=0
          for f in examples/minimal/paper.md examples/full/paper.md template/paper.md; do
            if [ -f "$f" ]; then
              # 排除註解內容、排除 LaTeX 註解
              if grep -n "——" "$f" | grep -v "^\s*%" | grep -v "^\s*<!--"; then
                echo "::error file=$f::Found forbidden em-dash「——」in paper content"
                violations=$((violations + 1))
              fi
            fi
          done
          if [ "$violations" -gt 0 ]; then
            exit 1
          fi
          echo "OK: No forbidden em-dashes in paper content"

      - name: Check section anchors in template
        run: |
          # template/paper.md 中所有 # / ## 標題後都應有 {#sec:...}
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          def check_file(md_path: Path) -> list[str]:
              violations = []
              text = md_path.read_text(encoding="utf-8")
              lines = text.splitlines()

              # 找 YAML frontmatter 範圍
              yaml_end = -1
              if lines and lines[0].strip() == "---":
                  for i, line in enumerate(lines[1:], 1):
                      if line.strip() == "---":
                          yaml_end = i
                          break

              in_code_block = False
              for i, line in enumerate(lines, 1):
                  # 跳過 YAML frontmatter
                  if i <= yaml_end + 1:
                      continue
                  # 偵測 code block
                  if line.strip().startswith("```"):
                      in_code_block = not in_code_block
                      continue
                  if in_code_block:
                      continue
                  # 偵測 HTML 註解
                  if line.lstrip().startswith("<!--"):
                      continue
                  # 偵測標題且未含 {#sec:
                  if re.match(r"^#{1,4}\s+\S", line) and "{#sec:" not in line:
                      violations.append(f"{md_path}:{i}: {line.strip()}")
              return violations

          all_violations = []
          for md in Path("template").glob("*.md"):
              if md.name == "CLAUDE.md":
                  continue
              all_violations.extend(check_file(md))

          if all_violations:
              print("ERROR: Section anchors missing in template/")
              for v in all_violations:
                  print(f"  {v}")
              sys.exit(1)
          print("OK: All template sections have section anchors")
          EOF

      - name: Check Marp slides frontmatter and page count
        run: |
          # 檢查所有 *.md 含 `marp: true` 的檔案：
          #   1. frontmatter 必須有 theme:
          #   2. 總頁數不得超過 35
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          def parse_frontmatter(text: str) -> dict:
              if not text.startswith("---\n"):
                  return {}
              end = text.find("\n---\n", 4)
              if end == -1:
                  return {}
              fm = {}
              for line in text[4:end].splitlines():
                  m = re.match(r"^([A-Za-z][A-Za-z0-9_-]*)\s*:\s*(.*)$", line)
                  if m:
                      fm[m.group(1)] = m.group(2).strip().strip('"').strip("'")
              return fm

          def count_slides(text: str) -> int:
              # Marp 分頁：空行 + --- + 空行（含檔案開頭的 frontmatter 後也有一個 ---）
              # 簡化：計算位於行首的 --- 出現次數，扣掉 frontmatter 的 2 個
              count = 0
              in_fm = False
              fm_seen = 0
              for i, line in enumerate(text.splitlines()):
                  if line.strip() == "---":
                      if i == 0:
                          in_fm = True
                          fm_seen += 1
                      elif in_fm and fm_seen < 2:
                          in_fm = False
                          fm_seen += 1
                      else:
                          count += 1
              # 第一頁不需 ---，所以總頁數 = 分隔線數 + 1
              return count + 1

          all_slides = list(Path(".").rglob("*.md"))
          violations = []
          MAX_PAGES = 35

          for md in all_slides:
              if any(p in md.parts for p in (".git", "node_modules", ".venv", "venv")):
                  continue
              try:
                  text = md.read_text(encoding="utf-8")
              except Exception:
                  continue
              fm = parse_frontmatter(text)
              if fm.get("marp", "").lower() != "true":
                  continue

              if not fm.get("theme"):
                  violations.append(f"{md}: marp frontmatter 缺少 theme:")

              pages = count_slides(text)
              if pages > MAX_PAGES:
                  violations.append(f"{md}: 簡報共 {pages} 頁，超過上限 {MAX_PAGES} 頁")
              else:
                  print(f"OK: {md} ({pages} pages)")

          if violations:
              print("\nERROR: Marp 簡報檢查未通過")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          print("OK: All Marp slides pass lint")
          EOF
