name: Build Examples

# 編譯範例 PDF 較重，但靠 docker/ 下預建的 build image 就不必每次都重跑 apt install
# 或下載 Chrome for Testing。
#
# Flow：
#   1. prepare-*-image：build docker image，推到 GHCR，tag = ci-<run_id>。
#      使用 GHA cache，第二次 PR 跑時 docker build 大多 cache hit。
#   2. build / build-slides：以該 image 當 container 跑，跳過 apt install / npm install。
#
# 觸發時機：
#   - PR 開啟/更新時
#   - 手動觸發
#   - push 到 main 但有改到編譯相關檔案
on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'profiles/**'
      - 'shared/**'
      - 'examples/**'
      - 'scripts/build.sh'
      - 'scripts/build.ps1'
      - 'scripts/build-slides.sh'
      - 'scripts/build-slides.ps1'
      - 'Makefile'
      - 'docker/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ci-${{ github.run_id }}

jobs:
  prepare-paper-image:
    name: Prepare paper build image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push paper image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/paper.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/paperforge-paper:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=paperforge-paper
          cache-to: type=gha,mode=max,scope=paperforge-paper

      - name: Expose image ref
        id: ref
        run: echo "image=ghcr.io/${{ steps.owner.outputs.owner }}/paperforge-paper:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  prepare-slides-image:
    name: Prepare slides build image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push slides image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/slides.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/paperforge-slides:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=paperforge-slides
          cache-to: type=gha,mode=max,scope=paperforge-slides

      - name: Expose image ref
        id: ref
        run: echo "image=ghcr.io/${{ steps.owner.outputs.owner }}/paperforge-slides:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  build:
    name: Build PDFs on Ubuntu
    needs: prepare-paper-image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ${{ needs.prepare-paper-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          pandoc --version | head -n1
          xelatex --version | head -n1
          biber --version | head -n1
          fc-list :lang=zh-tw | head -n5

      - name: Make build script executable
        run: chmod +x scripts/build.sh

      - name: Build minimal example
        run: |
          ./scripts/build.sh examples/minimal/paper.md --verbose
          ls -lh examples/minimal/paper.pdf

      - name: Build full example
        run: |
          ./scripts/build.sh examples/full/paper.md --verbose
          ls -lh examples/full/paper.pdf

      - name: Verify PDFs are valid
        run: |
          for pdf in examples/minimal/paper.pdf examples/full/paper.pdf; do
            if [ ! -f "$pdf" ]; then
              echo "::error::Missing PDF: $pdf"
              exit 1
            fi
            size=$(stat -c%s "$pdf")
            if [ "$size" -lt 10240 ]; then
              echo "::error::PDF too small ($size bytes): $pdf"
              exit 1
            fi
            echo "PASS: $pdf ($size bytes)"
          done

      - name: Upload PDFs as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: example-pdfs
          path: |
            examples/minimal/paper.pdf
            examples/full/paper.pdf
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            examples/**/*.log
            examples/**/*.tex
            examples/**/*.aux
            examples/**/*.blg
          retention-days: 7

  build-slides:
    name: Build Marp Slides on Ubuntu
    needs: prepare-slides-image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ${{ needs.prepare-slides-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          node --version
          marp --version
          fc-list :lang=zh-tw | head -n3

      - name: Make build script executable
        run: chmod +x scripts/build-slides.sh

      - name: Build minimal slides example (PDF)
        run: |
          ./scripts/build-slides.sh examples/slides-minimal/slides.md --pdf --verbose
          ls -lh examples/slides-minimal/slides.pdf

      - name: Build minimal slides example (HTML)
        run: |
          ./scripts/build-slides.sh examples/slides-minimal/slides.md --html
          ls -lh examples/slides-minimal/slides.html

      - name: Verify outputs
        run: |
          pdf="examples/slides-minimal/slides.pdf"
          if [ ! -f "$pdf" ]; then
            echo "::error::Missing PDF: $pdf"
            exit 1
          fi
          size=$(stat -c%s "$pdf")
          if [ "$size" -lt 102400 ]; then
            echo "::error::PDF too small ($size bytes, expected > 100 KB): $pdf"
            exit 1
          fi
          echo "PASS: $pdf ($size bytes)"

          html="examples/slides-minimal/slides.html"
          if [ ! -f "$html" ]; then
            echo "::error::Missing HTML: $html"
            exit 1
          fi
          echo "PASS: $html ($(stat -c%s "$html") bytes)"

      - name: Upload slides artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: example-slides
          path: |
            examples/slides-minimal/slides.pdf
            examples/slides-minimal/slides.html
          retention-days: 30
